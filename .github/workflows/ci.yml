name: geometry gate

# The tests assert clearances, mesh ratios and stack heights numerically —
# they are the "don't waste plastic" gate and must pass before any print.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -q
