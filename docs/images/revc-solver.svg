<text x="598" y="741" font-family="sans-serif" font-size="11" fill="#5F5E5A">z 17.7</text>
<path d="M 90 872 L 155 872 L 155 897.6 L 245 897.6 L 245 872 L 420 872 L 420 902 L 570 902 L 570 872 L 590 872 L 590 950 L 90 950 Z" fill="#F1EFE8" stroke="#444441" stroke-width="1.5"/>
<text x="106" y="936" font-family="sans-serif" font-size="11" fill="#5F5E5A">mainplate</text>
<rect x="157" y="818" width="86" height="103.6" fill="#9FE1CB" fill-opacity="0.7" stroke="#0F6E56" stroke-width="1.5"/>
<text x="200" y="912" font-family="sans-serif" font-size="11" fill="#04342C" text-anchor="middle">drum</text>
<rect x="115" y="779" width="215" height="36" fill="#5DCAA5" fill-opacity="0.6" stroke="#0F6E56" stroke-width="1.5"/>
<text x="222" y="802" font-family="sans-serif" font-size="11" fill="#04342C" text-anchor="middle">80t minute wheel &#8212; shelf B</text>
<rect x="290" y="827" width="26" height="36" fill="#5DCAA5" fill-opacity="0.6" stroke="#0F6E56" stroke-width="1.5"/>
<rect x="425" y="818" width="130" height="40.8" fill="#CECBF6" fill-opacity="0.7" stroke="#534AB7" stroke-width="1.5"/>
<text x="490" y="844" font-family="sans-serif" font-size="11" fill="#26215C" text-anchor="middle">balance ring</text>
<rect x="435" y="869.6" width="110" height="30" fill="#AFA9EC" fill-opacity="0.6" stroke="#534AB7" stroke-width="1.5"/>
<text x="490" y="889" font-family="sans-serif" font-size="11" fill="#26215C" text-anchor="middle">lever + esc. wheel</text>
<rect x="440" y="780.8" width="100" height="28.8" fill="#CECBF6" fill-opacity="0.7" stroke="#534AB7" stroke-width="1.5"/>
<text x="490" y="799" font-family="sans-serif" font-size="11" fill="#26215C" text-anchor="middle">hairspring</text>
<rect x="100" y="737.6" width="345" height="36" fill="#F1EFE8" stroke="#444441" stroke-width="1.5"/>
<text x="270" y="760" font-family="sans-serif" font-size="11" fill="#2C2C2A" text-anchor="middle">ONE bridge</text>
<rect x="465" y="737.6" width="115" height="36" fill="#F1EFE8" stroke="#444441" stroke-width="1.5"/>
<text x="522" y="760" font-family="sans-serif" font-size="11" fill="#2C2C2A" text-anchor="middle">cock (same height)</text>
<line x1="150" y1="797" x2="120" y2="700" stroke="#888780" stroke-width="1"/>
<text x="44" y="686" font-family="sans-serif" font-size="11" fill="#5F5E5A">the wheel passes OVER the drum:</text>
<text x="44" y="700" font-family="sans-serif" font-size="11" fill="#5F5E5A">same footprint, higher shelf</text>
</svg>
