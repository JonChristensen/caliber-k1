<svg width="680" viewBox="0 0 680 1010" role="img" xmlns="http://www.w3.org/2000/svg">
<title>How the rev C layout solver works</title>
<desc>Three-part diagram: the cylinder rule for spinning parts, the top-view map of the solved movement with the mesh-distance search circle, and the side-view shelf system of z-heights.</desc>
<rect x="0" y="0" width="680" height="1010" fill="#FFFFFF"/>
<text x="40" y="52" font-family="sans-serif" font-size="15" font-weight="bold" fill="#2C2C2A">1 &#183; Every spinning part claims a &#8220;can&#8221; of space</text>
<circle cx="130" cy="150" r="48" fill="#9FE1CB" fill-opacity="0.6" stroke="#0F6E56" stroke-width="1.5"/>
<circle cx="130" cy="150" r="2.5" fill="#0F6E56"/>
<circle cx="262" cy="150" r="34" fill="#9FE1CB" fill-opacity="0.6" stroke="#0F6E56" stroke-width="1.5"/>
<circle cx="262" cy="150" r="2.5" fill="#0F6E56"/>
<line x1="130" y1="150" x2="262" y2="150" stroke="#888780" stroke-width="1" stroke-dasharray="4 3"/>
<text x="196" y="141" font-family="sans-serif" font-size="11" fill="#5F5E5A" text-anchor="middle">d</text>
<text x="130" y="216" font-family="sans-serif" font-size="11" fill="#5F5E5A" text-anchor="middle">r1</text>
<text x="262" y="204" font-family="sans-serif" font-size="11" fill="#5F5E5A" text-anchor="middle">r2</text>
<text x="196" y="238" font-family="sans-serif" font-size="12.5" fill="#2C2C2A" text-anchor="middle">safe if d &#8805; r1 + r2 + 2mm</text>
<circle cx="500" cy="150" r="44" fill="#F5C4B3" fill-opacity="0.7" stroke="#993C1D" stroke-width="1.5"/>
<circle cx="566" cy="150" r="26" fill="#F5C4B3" fill-opacity="0.7" stroke="#993C1D" stroke-width="1.5"/>
<text x="524" y="216" font-family="sans-serif" font-size="11" fill="#5F5E5A" text-anchor="middle">meshing gears MUST overlap</text>
<text x="524" y="232" font-family="sans-serif" font-size="11" fill="#5F5E5A" text-anchor="middle">(whitelist; teeth checked separately)</text>
<text x="40" y="308" font-family="sans-serif" font-size="15" font-weight="bold" fill="#2C2C2A">2 &#183; The solved map, seen from above</text>
<text x="40" y="328" font-family="sans-serif" font-size="11" fill="#5F5E5A">walk the dashed circle, keep spots that don't crash</text>
<circle cx="340" cy="516" r="136" fill="none" stroke="#B4B2A9" stroke-width="1.5"/>
<text x="212" y="404" font-family="sans-serif" font-size="11" fill="#5F5E5A">mainplate &#216;170</text>
<circle cx="340" cy="453.6" r="56" fill="none" stroke="#888780" stroke-width="1.2" stroke-dasharray="5 4"/>
<g stroke="#888780" stroke-width="1.4" fill="none">
  <path d="M392 449.6 l8 8 m0 -8 l-8 8"/>
  <path d="M375.6 410 l8 8 m0 -8 l-8 8"/>
  <path d="M336 393.6 l8 8 m0 -8 l-8 8"/>
  <path d="M296.4 410 l8 8 m0 -8 l-8 8"/>
  <path d="M336 505.6 l8 8 m0 -8 l-8 8"/>
</g>
<circle cx="340" cy="453.6" r="46.4" fill="#9FE1CB" fill-opacity="0.6" stroke="#0F6E56" stroke-width="1.5"/>
<circle cx="304" cy="496.5" r="65.6" fill="#9FE1CB" fill-opacity="0.45" stroke="#0F6E56" stroke-width="1.5"/>
<circle cx="304" cy="566.9" r="40" fill="#9FE1CB" fill-opacity="0.45" stroke="#0F6E56" stroke-width="1.5"/>
<circle cx="338.4" cy="595.7" r="30.4" fill="#9FE1CB" fill-opacity="0.45" stroke="#0F6E56" stroke-width="1.5"/>
<circle cx="379" cy="581" r="27.2" fill="#9FE1CB" fill-opacity="0.45" stroke="#0F6E56" stroke-width="1.5"/>
<circle cx="410.9" cy="525.4" r="41.6" fill="#CECBF6" fill-opacity="0.55" stroke="#534AB7" stroke-width="1.5"/>
<circle cx="304" cy="496.5" r="4.5" fill="#0F6E56"/>
<text x="340" y="440" font-family="sans-serif" font-size="12.5" fill="#2C2C2A" text-anchor="middle">barrel</text>
<text x="258" y="486" font-family="sans-serif" font-size="12.5" fill="#2C2C2A">minute</text>
<text x="262" y="572" font-family="sans-serif" font-size="12.5" fill="#2C2C2A">third</text>
<text x="322" y="614" font-family="sans-serif" font-size="12.5" fill="#2C2C2A">fourth</text>
<text x="386" y="600" font-family="sans-serif" font-size="12.5" fill="#2C2C2A">escape</text>
<text x="428" y="514" font-family="sans-serif" font-size="12.5" fill="#2C2C2A">balance</text>
<line x1="318" y1="470" x2="520" y2="420" stroke="#888780" stroke-width="1"/>
<text x="526" y="416" font-family="sans-serif" font-size="11" fill="#5F5E5A">these two overlap from above &#8212;</text>
<text x="526" y="431" font-family="sans-serif" font-size="11" fill="#5F5E5A">legal: different shelves (below)</text>
<line x1="284" y1="453.6" x2="150" y2="430" stroke="#888780" stroke-width="1"/>
<text x="44" y="426" font-family="sans-serif" font-size="11" fill="#5F5E5A">teeth mesh only at</text>
<text x="44" y="441" font-family="sans-serif" font-size="11" fill="#5F5E5A">EXACTLY 35mm, so the</text>
<text x="44" y="456" font-family="sans-serif" font-size="11" fill="#5F5E5A">minute wheel lives some-</text>
<text x="44" y="471" font-family="sans-serif" font-size="11" fill="#5F5E5A">where on this circle</text>
<text x="40" y="722" font-family="sans-serif" font-size="15" font-weight="bold" fill="#2C2C2A">3 &#183; Same movement, from the side (the shelves)</text>
<g stroke="#D3D1C7" stroke-width="1" stroke-dasharray="3 4">
  <line x1="90" y1="866" x2="590" y2="866"/>
  <line x1="90" y1="818" x2="590" y2="818"/>
  <line x1="90" y1="776" x2="590" y2="776"/>
  <line x1="90" y1="737.6" x2="590" y2="737.6"/>
</g>
